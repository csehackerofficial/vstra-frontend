<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Account Access | VASTRA Store</title>
    <meta name="description" content="Sign in, create an account, or recover your password on VASTRA.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @font-face { font-family: 'Amazon Ember'; src: local('Amazon Ember'), url('https://m.media-amazon.com/images/G/01/AUIClients/AmazonEmber-Regular-934f0d2382743818c5483f8d227311394b87e6b0._V1_.woff2') format('woff2'); font-weight: 400; }
        @font-face { font-family: 'Amazon Ember'; src: local('Amazon Ember Bold'), url('https://m.media-amazon.com/images/G/01/AUIClients/AmazonEmber-Bold-7333a3648a8579471f45600557434190c4273063._V1_.woff2') format('woff2'); font-weight: 700; }
        body { font-family: 'Amazon Ember', Arial, sans-serif; background-color: #fcfcfc; color: #111; display: flex; flex-direction: column; min-height: 100vh; }
    </style>
</head>
<body class="selection:bg-gray-200 selection:text-black">

    <nav class="bg-white border-b border-gray-200 h-16 w-full shadow-sm flex items-center justify-center">
        <a href="index.html" class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
            <div class="w-8 h-8 bg-black text-white flex items-center justify-center font-bold rounded">V</div>
            <span class="text-xl font-bold tracking-tighter">VASTRA</span>
        </a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4 py-12">
        <div class="bg-white w-full max-w-md rounded-lg shadow-2xl overflow-hidden border border-gray-100">
            <div class="p-8 md:p-10">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold tracking-tight uppercase" id="form-title">Welcome Back</h2>
                    <p class="text-xs text-gray-500 mt-2" id="form-subtitle">Enter your credentials to access your account.</p>
                </div>

                <form id="login-form" class="space-y-5 block">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-2">Email OR Phone Number</label>
                        <input type="text" id="login-id" class="w-full border-b-2 border-gray-200 py-2 outline-none focus:border-black transition-colors" placeholder="Email or 10-digit phone" required>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-widest block">Password</label>
                            <button type="button" onclick="switchMode('forgot')" class="text-[10px] font-bold text-blue-600 hover:underline uppercase tracking-widest">Forgot?</button>
                        </div>
                        <input type="password" id="login-pass" class="w-full border-b-2 border-gray-200 py-2 outline-none focus:border-black transition-colors" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="w-full bg-black text-white py-3.5 text-xs font-bold uppercase tracking-widest rounded hover:bg-gray-800 transition-colors shadow-md mt-6">
                        Sign In Securely
                    </button>
                    <p class="text-center text-xs mt-6 text-gray-500">New to Vastra? <button type="button" onclick="switchMode('register')" class="font-bold text-black hover:underline">Create an Account</button></p>
                </form>

                <form id="register-form" class="space-y-4 hidden">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Full Name</label>
                        <input type="text" id="reg-name" class="w-full border-b-2 border-gray-200 py-1.5 outline-none focus:border-black text-sm" placeholder="e.g. Aayush Kumar" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Email Address</label>
                        <input type="email" id="reg-email" class="w-full border-b-2 border-gray-200 py-1.5 outline-none focus:border-black text-sm" placeholder="you@example.com" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Phone Number</label>
                        <input type="tel" id="reg-phone" class="w-full border-b-2 border-gray-200 py-1.5 outline-none focus:border-black text-sm" placeholder="10-digit number" pattern="[0-9]{10}" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1">Password</label>
                        <input type="password" id="reg-pass" class="w-full border-b-2 border-gray-200 py-1.5 outline-none focus:border-black text-sm" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="w-full bg-black text-white py-3.5 text-xs font-bold uppercase tracking-widest rounded hover:bg-gray-800 transition-colors shadow-md mt-6">
                        Create Account
                    </button>
                    <p class="text-center text-xs mt-6 text-gray-500">Already a member? <button type="button" onclick="switchMode('login')" class="font-bold text-black hover:underline">Sign In</button></p>
                </form>

                <form id="forgot-form" class="space-y-5 hidden">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-2">Registered Email</label>
                        <input type="email" id="forgot-email" class="w-full border-b-2 border-gray-200 py-2 outline-none focus:border-black transition-colors" placeholder="you@example.com" required>
                    </div>
                    <button type="submit" class="w-full bg-black text-white py-3.5 text-xs font-bold uppercase tracking-widest rounded hover:bg-gray-800 transition-colors shadow-md mt-6">
                        Send Recovery Link
                    </button>
                    <p class="text-center text-xs mt-6 text-gray-500">Remember your password? <button type="button" onclick="switchMode('login')" class="font-bold text-black hover:underline">Back to Sign In</button></p>
                </form>

                <form id="reset-form" class="space-y-5 hidden">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-2">New Password</label>
                        <input type="password" id="new-pass" class="w-full border-b-2 border-gray-200 py-2 outline-none focus:border-black transition-colors" placeholder="Enter new password" required>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3.5 text-xs font-bold uppercase tracking-widest rounded hover:bg-blue-700 transition-colors shadow-md mt-6">
                        Update Password
                    </button>
                    <p class="text-center text-xs mt-6 text-gray-500"><button type="button" onclick="switchMode('login')" class="font-bold text-black hover:underline">Cancel & Go to Login</button></p>
                </form>

            </div>
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-8 border-t-4 border-black w-full mt-auto">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-xs text-gray-500 text-center md:text-left">
            <p>&copy; 2026 VASTRA Official Store.</p>
            <p class="mt-2 md:mt-0 font-medium">Developed by <span class="text-white font-bold tracking-widest">VASTRAWIDE TECH TEAM</span></p>
        </div>
    </footer>

    <div id="custom-alert-container"></div>

    <script src="js/auth.js"></script>
    
    <script>
        // --- UI Switching Logic ---
        function switchMode(mode) {
            ['login-form', 'register-form', 'forgot-form', 'reset-form'].forEach(id => document.getElementById(id).classList.add('hidden'));
            
            if (mode === 'login') {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('form-title').innerText = "Welcome Back";
                document.getElementById('form-subtitle').innerText = "Enter your credentials to access your account.";
            } else if (mode === 'register') {
                document.getElementById('register-form').classList.remove('hidden');
                document.getElementById('form-title').innerText = "Join Vastra";
                document.getElementById('form-subtitle').innerText = "Create your premium fashion account today.";
            } else if (mode === 'forgot') {
                document.getElementById('forgot-form').classList.remove('hidden');
                document.getElementById('form-title').innerText = "Reset Password";
                document.getElementById('form-subtitle').innerText = "We'll send a secure recovery link to your email.";
            } else if (mode === 'reset') {
                document.getElementById('reset-form').classList.remove('hidden');
                document.getElementById('form-title').innerText = "Secure Your Account";
                document.getElementById('form-subtitle').innerText = "Create a strong new password.";
            }
        }

        // --- URL Checking for Reset Token ---
        let urlToken = null;
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            urlToken = params.get('token');
            if (urlToken) { switchMode('reset'); } // If link has token, show Reset Form directly!
            else { switchMode('login'); }
        });

        const API_BASE = 'https://vstra-backend.onrender.com/api';

        // 1. LOGIN API
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.innerText = "AUTHENTICATING..."; btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login_id: document.getElementById('login-id').value, password: document.getElementById('login-pass').value })
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('vastra_user', JSON.stringify(data.user));
                    if(window.vastraAlert) vastraAlert('Login Successful!', 'success');
                    setTimeout(() => { window.location.href = data.user.role === 'admin' ? 'admin_dashboard.html' : 'index.html'; }, 1000);
                } else { 
                    if(window.vastraAlert) vastraAlert(data.message, 'error'); else alert(data.message);
                }
            } catch(err) { if(window.vastraAlert) vastraAlert("Server is offline.", 'error'); }
            finally { btn.innerText = "SIGN IN SECURELY"; btn.disabled = false; }
        });

        // 2. REGISTER API
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.innerText = "CREATING..."; btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ 
                        name: document.getElementById('reg-name').value, 
                        email: document.getElementById('reg-email').value, 
                        phone_number: document.getElementById('reg-phone').value, 
                        password: document.getElementById('reg-pass').value 
                    })
                });
                const data = await res.json();
                if(data.success) {
                    if(window.vastraAlert) vastraAlert(data.message, 'success');
                    setTimeout(() => { switchMode('login'); }, 1500);
                } else { if(window.vastraAlert) vastraAlert(data.message, 'error'); }
            } catch(err) { if(window.vastraAlert) vastraAlert("Server error.", 'error'); }
            finally { btn.innerText = "CREATE ACCOUNT"; btn.disabled = false; }
        });

        // 3. FORGOT PASSWORD API
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.innerText = "SENDING..."; btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/forgot-password`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('forgot-email').value })
                });
                const data = await res.json();
                if(window.vastraAlert) vastraAlert(data.message, data.success ? 'success' : 'error');
            } catch(err) { if(window.vastraAlert) vastraAlert("Server error.", 'error'); }
            finally { btn.innerText = "SEND RECOVERY LINK"; btn.disabled = false; }
        });

        // 4. RESET PASSWORD API (With Token)
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.innerText = "UPDATING..."; btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/update-password`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: urlToken, password: document.getElementById('new-pass').value })
                });
                const data = await res.json();
                if(data.success) {
                    if(window.vastraAlert) vastraAlert("Password Updated Successfully!", 'success');
                    setTimeout(() => { window.location.href = 'login.html'; }, 1500); // Clear token from URL
                } else { if(window.vastraAlert) vastraAlert(data.message, 'error'); }
            } catch(err) { if(window.vastraAlert) vastraAlert("Server error.", 'error'); }
            finally { btn.innerText = "UPDATE PASSWORD"; btn.disabled = false; }
        });
    </script>
</body>
</html>
