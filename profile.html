<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | VASTRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @font-face { font-family: 'Amazon Ember'; src: local('Amazon Ember'), url('https://m.media-amazon.com/images/G/01/AUIClients/AmazonEmber-Regular-934f0d2382743818c5483f8d227311394b87e6b0._V1_.woff2') format('woff2'); font-weight: 400; }
        @font-face { font-family: 'Amazon Ember'; src: local('Amazon Ember Bold'), url('https://m.media-amazon.com/images/G/01/AUIClients/AmazonEmber-Bold-7333a3648a8579471f45600557434190c4273063._V1_.woff2') format('woff2'); font-weight: 700; }
        body { font-family: 'Amazon Ember', Arial, sans-serif; background-color: #fcfcfc; color: #111; }
        
        .tab-btn.active { border-left: 4px solid black; background-color: #f9fafb; color: black; font-weight: bold; }
        .logo-container { display: flex; align-items: center; cursor: pointer; overflow: hidden; padding-right: 5px; }
        .logo-box { width: 32px; height: 32px; background-color: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 4px; transition: all 0.4s ease-in-out; z-index: 2; }
        .logo-text-hidden { max-width: 0; opacity: 0; font-weight: bold; font-size: 1.125rem; letter-spacing: -0.05em; white-space: nowrap; transition: all 0.4s ease-in-out; transform: translateX(-10px); color: #000; }
        .logo-container:hover .logo-text-hidden { max-width: 100px; opacity: 1; transform: translateX(5px); }
    </style>
</head>
<body class="selection:bg-gray-200 selection:text-black">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-200 h-16 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 h-full flex justify-between items-center">
            <div class="logo-container" onclick="window.location.href='index.html'">
                <div class="logo-box">V</div>
                <div class="logo-text-hidden">ASTRA</div>
            </div>
            <a href="index.html" class="text-xs font-bold uppercase hover:underline text-gray-500 hover:text-black transition-all">Back to Store</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row gap-8">
            
            <aside class="w-full md:w-64 space-y-1 border-r border-gray-100 pr-4">
                <button onclick="switchTab('info')" id="btn-info" class="tab-btn active w-full text-left px-4 py-3 text-xs font-semibold uppercase tracking-widest text-gray-500 hover:text-black hover:bg-gray-50 transition-all flex items-center gap-3 rounded-r-md">
                    <i class="ri-user-settings-line text-lg"></i> Personal Info
                </button>
                <button onclick="switchTab('wishlist')" id="btn-wishlist" class="tab-btn w-full text-left px-4 py-3 text-xs font-semibold uppercase tracking-widest text-gray-500 hover:text-black hover:bg-gray-50 transition-all flex items-center gap-3 rounded-r-md">
                    <i class="ri-bookmark-line text-lg"></i> Wishlist
                </button>
                <button onclick="switchTab('orders')" id="btn-orders" class="tab-btn w-full text-left px-4 py-3 text-xs font-semibold uppercase tracking-widest text-gray-500 hover:text-black hover:bg-gray-50 transition-all flex items-center gap-3 rounded-r-md">
                    <i class="ri-shopping-bag-line text-lg"></i> My Orders
                </button>
                <button onclick="handleLogout()" class="w-full text-left px-4 py-3 text-xs font-semibold uppercase tracking-widest text-red-500 hover:text-red-700 hover:bg-red-50 transition-all flex items-center gap-3 mt-10 rounded-md">
                    <i class="ri-logout-circle-line text-lg"></i> Logout
                </button>
            </aside>

            <div class="flex-grow bg-white p-6 md:p-10 rounded-lg border border-gray-100 shadow-sm min-h-[500px]">
                
                <section id="sec-info" class="space-y-8 block">
                    <h2 class="text-2xl font-bold border-b border-gray-100 pb-4">Personal Information</h2>
                    <div class="flex flex-col md:flex-row items-center md:items-start gap-8">
                        <div class="relative group">
                            <div id="profile-pic-display" class="w-32 h-32 bg-gray-100 rounded-full flex items-center justify-center text-4xl font-bold border border-gray-300 overflow-hidden text-gray-600 shadow-inner">
                                </div>
                            <label class="absolute bottom-0 right-2 bg-black text-white p-2 rounded-full cursor-pointer hover:scale-110 transition-all shadow-lg border-2 border-white">
                                <i class="ri-camera-fill"></i>
                                <input type="file" accept="image/*" class="hidden" id="upload-pic" onchange="updateProfilePic(event)">
                            </label>
                        </div>
                        <div class="space-y-4 w-full md:w-1/2">
                            <div>
                                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Full Name</label>
                                <p id="user-name" class="text-lg font-semibold text-gray-900 border-b border-gray-200 pb-1">Loading...</p>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Email Address</label>
                                <p id="user-email" class="text-lg font-semibold text-gray-900 border-b border-gray-200 pb-1">Loading...</p>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="sec-wishlist" class="hidden space-y-6">
                    <h2 class="text-2xl font-bold border-b border-gray-100 pb-4">My Wishlist</h2>
                    <div id="wishlist-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        </div>
                </section>

                <section id="sec-orders" class="hidden space-y-6">
                    <h2 class="text-2xl font-bold border-b border-gray-100 pb-4">Order History</h2>
                    <p class="text-xs text-gray-500 italic mb-4">Products you clicked to purchase are tracked here.</p>
                    <div id="orders-list" class="space-y-4">
                        </div>
                </section>

            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
