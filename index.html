<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTRA | Official Store</title>
    
    <style>
        @font-face { font-family: 'Amazon Ember'; src: local('Amazon Ember'), url('https://m.media-amazon.com/images/G/01/AUIClients/AmazonEmber-Regular-934f0d2382743818c5483f8d227311394b87e6b0._V1_.woff2') format('woff2'); font-weight: 400; }
        @font-face { font-family: 'Amazon Ember'; src: local('Amazon Ember Bold'), url('https://m.media-amazon.com/images/G/01/AUIClients/AmazonEmber-Bold-7333a3648a8579471f45600557434190c4273063._V1_.woff2') format('woff2'); font-weight: 700; }

        :root { --font-main: 'Amazon Ember', Arial, sans-serif; }
        body { font-family: var(--font-main); background-color: #fcfcfc; color: #111; }

        .logo-container { display: flex; align-items: center; cursor: pointer; overflow: hidden; padding-right: 5px; }
        .logo-box { width: 32px; height: 32px; background-color: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 4px; transition: all 0.4s ease-in-out; z-index: 2; }
        .logo-text-hidden { max-width: 0; opacity: 0; font-weight: bold; font-size: 1.125rem; letter-spacing: -0.05em; white-space: nowrap; transition: all 0.4s ease-in-out; transform: translateX(-10px); color: #000; }
        .logo-container:hover .logo-text-hidden { max-width: 100px; opacity: 1; transform: translateX(5px); }

        /* AUTOMATIC BANNER SLIDER */
        .slider-container { position: relative; width: 100%; height: 300px; overflow: hidden; border-radius: 8px; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); background-color: #eee; }
        @media (min-width: 768px) { .slider-container { height: 400px; } }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.8s ease-in-out; background-size: cover; background-position: center; cursor: pointer; }
        .slide.active { opacity: 1; z-index: 10; }
        .slider-nav { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 20; }
        .slider-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255, 255, 255, 0.5); cursor: pointer; transition: background 0.3s; }
        .slider-dot.active { background: #fff; }

        .animate-fade { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="selection:bg-gray-200 selection:text-black">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-200 h-16 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6 h-full flex justify-between items-center gap-4 md:gap-6">
            <div class="logo-container" onclick="window.location.href='index.html'">
                <div class="logo-box">V</div>
                <div class="logo-text-hidden">ASTRA</div>
            </div>
            
            <div class="flex-grow max-w-2xl relative">
                <input type="text" id="searchInput" onkeyup="handleSearch(event)" autocomplete="off"
                       placeholder="Search Vastra (e.g. Shirts, Sarees)..." 
                       class="w-full bg-gray-100 border border-transparent rounded-md py-2 px-10 outline-none focus:bg-white focus:border-blue-500 focus:shadow-[0_0_0_2px_rgba(59,130,246,0.2)] transition-all text-sm">
                <i class="ri-search-line absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
            </div>
            <div id="auth-section" class="text-xs font-semibold text-gray-700 flex items-center gap-4"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-8">
        
        <div class="slider-container animate-fade hidden" id="dynamic-slider-container">
            <div id="slider-track"></div>
            <div class="slider-nav" id="slider-nav"></div>
        </div>

        <header class="text-center mb-12 animate-fade hidden">
            <h1 class="text-3xl font-bold tracking-tight">The Vastra Collection</h1>
            <p id="status-text" class="text-xs text-gray-500 mt-2">Connecting to catalog...</p>
        </header>

        <section id="search-info" class="hidden mb-12 animate-fade">
            <div class="flex justify-between items-center border-b border-gray-200 pb-2">
                <h2 id="search-query-text" class="text-sm font-bold text-gray-800">Search Results</h2>
                <button onclick="clearSearch()" class="text-xs font-medium text-blue-600 hover:underline">Clear Search</button>
            </div>
            <div id="search-results-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 mt-6"></div>
        </section>

        <div id="storefront-content" class="space-y-16">
            <section id="featured-section">
                <h2 class="text-lg font-bold mb-4 text-gray-900 border-b border-gray-200 pb-2">Top Picks for You</h2>
                <div id="featured-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"></div>
            </section>
            <section id="men-section">
                <h2 class="text-lg font-bold mb-4 text-gray-900 border-b border-gray-200 pb-2">Men's Fashion</h2>
                <div id="men-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"></div>
            </section>
            <section id="women-section">
                <h2 class="text-lg font-bold mb-4 text-gray-900 border-b border-gray-200 pb-2">Women's Fashion</h2>
                <div id="women-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"></div>
            </section>
        </div>
    </main>

    <script src="js/auth.js" defer></script>
    <script src="js/main.js" defer></script>
</body>
</html>
