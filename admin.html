<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSTRA | Admin Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        body { background-color: #f9fafb; color: #111827; }
        .btn-black { background-color: #000000; color: #ffffff; transition: all 0.2s; border-radius: 4px; }
        .btn-black:hover { background-color: #374151; }
        
        /* Modal Style */
        #productModal { display: none; }
        .modal-overlay { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px); }
        
        /* Table Style */
        th { font-size: 12px; font-weight: 600; color: #6b7280; border-bottom: 2px solid #e5e7eb; text-transform: uppercase; }
        td { border-bottom: 1px solid #e5e7eb; padding-top: 12px; padding-bottom: 12px; }
        
        /* Custom Scrollbar for Inventory */
        .inventory-container::-webkit-scrollbar { height: 6px; }
        .inventory-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="font-sans antialiased">

    <nav class="border-b border-gray-200 h-16 sticky top-0 bg-white z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 h-full flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity cursor-pointer">
                <div class="w-8 h-8 bg-black text-white flex items-center justify-center font-bold rounded-sm">V</div>
                <h1 class="text-xl font-bold tracking-tight">VSTRA</h1>
            </a>
            <a href="index.html" class="text-sm font-medium text-gray-500 hover:text-black transition-all">Exit Store</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div>
                <h2 class="text-2xl font-semibold text-gray-900">Inventory Management</h2>
                <p class="text-sm text-gray-500 mt-1">Manage and track your listed products in the catalog.</p>
            </div>
            
            <button onclick="toggleModal(true)" class="btn-black px-6 py-3 text-sm font-semibold flex items-center gap-2 shadow-md active:scale-95">
                <i class="ri-add-line text-lg"></i> Add New Product
            </button>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-x-auto inventory-container">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="py-3 px-4 rounded-tl-lg">Preview</th>
                        <th class="py-3 px-2">Product Name</th>
                        <th class="py-3 px-2">Category</th>
                        <th class="py-3 px-2">Price</th>
                        <th class="py-3 px-4 text-right rounded-tr-lg">Action</th>
                    </tr>
                </thead>
                <tbody id="admin-list" class="divide-y divide-gray-100">
                    </tbody>
            </table>
            
            <div id="empty-msg" class="hidden text-center py-16">
                <p class="text-sm font-medium text-gray-400">No products found in database</p>
            </div>
        </div>
    </main>

    <div id="productModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="modal-overlay absolute inset-0" onclick="toggleModal(false)"></div>
        
        <div class="bg-white w-full max-w-lg relative z-10 rounded-lg p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-lg font-bold text-gray-900">List New Product</h3>
                <button onclick="toggleModal(false)" class="text-gray-400 hover:text-black text-xl transition-colors"><i class="ri-close-line"></i></button>
            </div>

            <form id="admin-form" onsubmit="saveProduct(event)" class="space-y-5">
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="text-xs font-semibold text-gray-600 block mb-1">Display Name</label>
                        <input type="text" id="p-title" placeholder="Enter Product Title" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-black transition-all" required>
                    </div>

                    <div>
                        <label class="text-xs font-semibold text-gray-600 block mb-1">Image Link (Source URL)</label>
                        <input type="url" id="p-image" placeholder="https://..." class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-black transition-all" required>
                    </div>

                    <div>
                        <label class="text-xs font-semibold text-gray-600 block mb-1">Purchase Link (Amazon/External)</label>
                        <input type="url" id="p-link" placeholder="https://amzn.to/..." class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-black transition-all" required>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-semibold text-gray-600 block mb-1">MRP (Original Price)</label>
                            <input type="number" id="p-mrp" placeholder="0" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-black transition-all" required>
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-gray-600 block mb-1">Sale Price</label>
                            <input type="number" id="p-price" placeholder="0" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-black transition-all" required>
                        </div>
                    </div>

                    <div>
                        <label class="text-xs font-semibold text-gray-600 block mb-1">Catalog Category</label>
                        <select id="p-category" class="w-full border border-gray-300 rounded px-3 py-2 text-sm bg-white outline-none focus:border-black cursor-pointer">
                            <option value="featured">Featured Drops</option>
                            <option value="men">Men's Apparel</option>
                            <option value="women">Women's Apparel</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="w-full btn-black py-3 text-sm font-bold mt-4 shadow-md">
                    Confirm & Publish Product
                </button>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
