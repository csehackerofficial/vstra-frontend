<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSTRA | Admin Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        /* 🌟 Pure B&W Theme */
        body { background-color: #ffffff; color: #000000; }
        .border-black-thick { border: 2px solid #000000; }
        .btn-black { background-color: #000000; color: #ffffff; transition: all 0.3s; }
        .btn-black:hover { background-color: #333333; }
        
        /* Modal Style */
        #productModal { display: none; }
        .modal-overlay { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); }
        
        /* Table Style */
        th { text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px; border-bottom: 2px solid #000; }
        td { border-bottom: 1px solid #eee; }
        
        /* Custom Scrollbar for Inventory */
        .inventory-container::-webkit-scrollbar { width: 4px; }
        .inventory-container::-webkit-scrollbar-thumb { background: #000; }
    </style>
</head>
<body class="font-sans antialiased">

    <nav class="border-b-2 border-black h-20 sticky top-0 bg-white z-40">
        <div class="max-w-7xl mx-auto px-6 h-full flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-black text-white flex items-center justify-center font-black italic">V</div>
                <h1 class="text-xl font-black uppercase tracking-tighter italic">VSTRA / Admin</h1>
            </div>
            <a href="index.html" class="text-[10px] font-black uppercase border-b-2 border-black pb-1 hover:opacity-50 transition-all">Exit Store</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div>
                <h2 class="text-3xl font-black uppercase italic tracking-tighter">Inventory Management</h2>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Manage and track your listed products</p>
            </div>
            
            <button onclick="toggleModal(true)" class="btn-black px-8 py-4 text-xs font-black uppercase tracking-[0.2em] flex items-center gap-2 shadow-xl active:scale-95">
                <i class="ri-add-line text-lg"></i> Add New Product
            </button>
        </div>

        <div class="bg-white overflow-x-auto inventory-container">
            <table class="w-full text-left">
                <thead>
                    <tr>
                        <th class="py-4 px-2">Preview</th>
                        <th class="py-4">Product Name</th>
                        <th class="py-4">Category</th>
                        <th class="py-4">Price</th>
                        <th class="py-4 text-right pr-4">Action</th>
                    </tr>
                </thead>
                <tbody id="admin-list">
                    </tbody>
            </table>
            
            <div id="empty-msg" class="hidden text-center py-24">
                <p class="text-[10px] font-black uppercase text-gray-300 tracking-[0.5em]">No products found in database</p>
            </div>
        </div>
    </main>

    <div id="productModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="modal-overlay absolute inset-0" onclick="toggleModal(false)"></div>
        
        <div class="bg-white w-full max-w-lg relative z-10 border-4 border-black p-10 shadow-[20px_20px_0px_0px_rgba(0,0,0,1)]">
            <div class="flex justify-between items-center mb-10">
                <h3 class="text-2xl font-black uppercase italic tracking-tight">List New Product</h3>
                <button onclick="toggleModal(false)" class="text-2xl hover:rotate-90 transition-transform"><i class="ri-close-line"></i></button>
            </div>

            <form id="admin-form" onsubmit="saveProduct(event)" class="space-y-6">
                <div class="grid grid-cols-1 gap-5">
                    <div>
                        <label class="text-[9px] font-black uppercase text-gray-400 block mb-1">Display Name</label>
                        <input type="text" id="p-title" placeholder="ENTER PRODUCT TITLE" class="w-full border-b-2 border-gray-100 py-3 text-xs font-bold outline-none focus:border-black transition-all" required>
                    </div>

                    <div>
                        <label class="text-[9px] font-black uppercase text-gray-400 block mb-1">Image Link (Source URL)</label>
                        <input type="url" id="p-image" placeholder="HTTPS://IMAGE-SOURCE.COM/IMG.JPG" class="w-full border-b-2 border-gray-100 py-3 text-xs font-bold outline-none focus:border-black transition-all" required>
                    </div>

                    <div>
                        <label class="text-[9px] font-black uppercase text-gray-400 block mb-1">Purchase Link (Amazon/External)</label>
                        <input type="url" id="p-link" placeholder="HTTPS://AMZN.TO/EXAMPLE" class="w-full border-b-2 border-gray-100 py-3 text-xs font-bold outline-none focus:border-black transition-all" required>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="text-[9px] font-black uppercase text-gray-400 block mb-1">MRP (Original Price)</label>
                            <input type="number" id="p-mrp" placeholder="0000" class="w-full border-b-2 border-gray-100 py-3 text-xs font-bold outline-none focus:border-black transition-all" required>
                        </div>
                        <div>
                            <label class="text-[9px] font-black uppercase text-gray-400 block mb-1">Sale Price</label>
                            <input type="number" id="p-price" placeholder="0000" class="w-full border-b-2 border-gray-100 py-3 text-xs font-bold outline-none focus:border-black transition-all" required>
                        </div>
                    </div>

                    <div>
                        <label class="text-[9px] font-black uppercase text-gray-400 block mb-1">Catalog Category</label>
                        <select id="p-category" class="w-full border-b-2 border-gray-100 py-3 text-xs font-bold bg-white outline-none focus:border-black cursor-pointer uppercase">
                            <option value="featured">Featured Drops</option>
                            <option value="men">Men's Apparel</option>
                            <option value="women">Women's Apparel</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="w-full btn-black py-5 text-[10px] font-black uppercase tracking-[0.4em] mt-6 shadow-lg shadow-gray-200">
                    Confirm & Publish Product
                </button>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
