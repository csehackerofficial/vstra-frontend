<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSTRA | Admin User Management</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        /* UI DESIGN SYSTEM: MONOCHROME */
        body { background-color: #ffffff; color: #000; }
        
        /* BRAND LOGO ANIMATION (ASTRA Logic) */
        .a-box { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid #000; }
        .a-letter { 
            display: inline-block; 
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            transform: rotate(180deg); 
        }
        .logo-group:hover .a-letter { transform: rotate(0deg); }
        .logo-group:hover .a-box { border-radius: 50%; background: #000; color: #fff; }

        /* Professional Table Styling */
        th { border-bottom: 2px solid #000; font-size: 10px; letter-spacing: 0.2em; }
        td { border-bottom: 1px solid #f1f1f1; font-size: 12px; }
        tr:hover { background-color: #fafafa; }
    </style>
</head>
<body class="font-sans antialiased">

    <nav class="border-b-2 border-black h-20 sticky top-0 bg-white z-50">
        <div class="max-w-7xl mx-auto px-6 h-full flex justify-between items-center">
            
            <div class="flex items-center gap-3 cursor-pointer logo-group" onclick="window.location.href='index.html'">
                <div class="a-box w-10 h-10 flex items-center justify-center font-black text-xl bg-black text-white">
                    <span class="a-letter">V</span>
                </div>
                <span class="text-xl font-black uppercase italic tracking-tighter">STRA Admin</span>
            </div>

            <div class="flex items-center gap-6">
                <button onclick="loadUsers()" class="text-[10px] font-black uppercase border-b-2 border-black pb-1 hover:opacity-50 transition-all">
                    <i class="ri-refresh-line mr-1"></i> Sync Database
                </button>
                <a href="admin.html" class="bg-black text-white px-4 py-2 text-[10px] font-black uppercase tracking-widest hover:bg-gray-800 transition-all">
                    Product Manager
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-16">
        
        <header class="mb-16">
            <h1 class="text-4xl font-black uppercase italic tracking-tighter">User Identity Registry</h1>
            <p class="text-[10px] font-bold text-gray-400 tracking-[0.4em] uppercase mt-2">
                Managing global user infrastructure & authentication logs
            </p>
        </header>

        <div class="bg-white overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="uppercase text-gray-400">
                        <th class="py-6 px-4">UID</th>
                        <th class="py-6">User Identity</th>
                        <th class="py-6">Email Address</th>
                        <th class="py-6">Registered On</th>
                        <th class="py-6 text-right pr-4">Status</th>
                    </tr>
                </thead>
                <tbody id="userTable">
                    </tbody>
            </table>

            <div id="loading-state" class="text-center py-20 hidden">
                <p class="text-[10px] font-black uppercase text-gray-300 animate-pulse tracking-[0.5em]">Synchronizing Registry...</p>
            </div>
        </div>
    </main>

    <script>
        /**
         * Fetches all registered users from the VSTRA Backend.
         * Maps database records to the administrative UI.
         */
        async function loadUsers() {
            const tableBody = document.getElementById("userTable");
            const loader = document.getElementById("loading-state");
            
            tableBody.innerHTML = "";
            loader.classList.remove("hidden");

            try {
                // Connecting to the Global API Gateway
                const response = await fetch("https://vstra-backend.onrender.com/api/users");
                const users = await response.json();

                loader.classList.add("hidden");

                if (users.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-20 text-[10px] font-black text-gray-300 uppercase">No identities found.</td></tr>`;
                    return;
                }

                // Rendering the User Stream
                tableBody.innerHTML = users.map(user => {
                    const registrationDate = new Date(user.created_at).toLocaleDateString('en-GB', {
                        day: '2-digit', month: 'short', year: 'numeric'
                    });

                    return `
                        <tr class="group">
                            <td class="py-6 px-4 font-mono text-[11px] text-gray-400">#${user.id}</td>
                            <td class="py-6 font-black uppercase tracking-tight">${user.name}</td>
                            <td class="py-6 font-bold text-gray-500">${user.email}</td>
                            <td class="py-6 font-bold italic text-xs">${registrationDate}</td>
                            <td class="py-6 text-right pr-4">
                                <span class="bg-green-50 text-green-600 text-[9px] font-black px-2 py-1 rounded-full uppercase">Active</span>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                loader.classList.add("hidden");
                console.error("Critical: Registry Sync Failed.", err);
                alert("VSTRA Error: Database Connection Refused.");
            }
        }

        // Initialize sync on boot
        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>
