<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VSTRA | Secure Reset</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <h2 class="section-title">Set New Keys</h2>
        <input type="password" id="newPass" placeholder="NEW PASSWORD">
        <input type="password" id="confirmPass" placeholder="CONFIRM NEW PASSWORD">
        <button class="primary-btn" onclick="updatePassword()">Update Identity</button>
    </div>
    <script>
        async function updatePassword() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const password = document.getElementById("newPass").value;
            const confirm = document.getElementById("confirmPass").value;
            if (password !== confirm) return alert("Passwords do not match!");
            try {
                const res = await fetch("https://vstra-backend.onrender.com/api/update-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                alert(data.message);
                if(data.success) window.location.href = 'login.html';
            } catch (err) { alert("Server Sync Error."); }
        }
    </script>
</body>
</html>
