<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTRA | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @font-face { font-family: 'Amazon Ember'; src: local('Amazon Ember'), url('https://m.media-amazon.com/images/G/01/AUIClients/AmazonEmber-Regular-934f0d2382743818c5483f8d227311394b87e6b0._V1_.woff2') format('woff2'); }
        body { font-family: 'Amazon Ember', Arial, sans-serif; background-color: #fcfcfc; }
        .tab-btn.active { border-left: 3px solid #000; background: #f9f9f9; color: #000; font-weight: 800; }
        .animate-fade { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="selection:bg-gray-200 selection:text-black flex flex-col min-h-screen">
    
    <nav class="bg-white border-b border-gray-100 h-16 w-full shadow-sm flex items-center justify-between px-4 md:px-6 sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-black text-white flex items-center justify-center font-bold rounded text-xs">V</div>
            <span class="text-sm font-black tracking-widest uppercase text-gray-800">Admin Control</span>
        </div>
        <button onclick="window.location.href='index.html'" class="text-[10px] font-bold text-gray-500 hover:text-black uppercase tracking-widest transition-colors flex items-center gap-1">
            <i class="ri-logout-box-r-line text-lg"></i> <span class="hidden md:inline">Exit Dashboard</span>
        </button>
    </nav>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-8 flex-grow w-full">
        <div class="flex flex-col md:flex-row gap-8">
            
            <aside class="w-full md:w-60 space-y-1 border-r border-gray-100 pr-0 md:pr-6">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-4 mb-4">Core Management</h3>
                
                <button onclick="switchTab('users')" id="btn-users" class="tab-btn active w-full text-left px-4 py-3.5 text-[10px] font-bold uppercase tracking-widest text-gray-500 hover:text-black hover:bg-gray-50 transition-all flex items-center gap-3 rounded-r-md">
                    <i class="ri-user-follow-line text-lg"></i> User Registry
                </button>
                <button onclick="switchTab('store')" id="btn-store" class="tab-btn w-full text-left px-4 py-3.5 text-[10px] font-bold uppercase tracking-widest text-gray-500 hover:text-black hover:bg-gray-50 transition-all flex items-center gap-3 rounded-r-md">
                    <i class="ri-shopping-bag-3-line text-lg"></i> Store Catalog
                </button>
                <button onclick="switchTab('sales')" id="btn-sales" class="tab-btn w-full text-left px-4 py-3.5 text-[10px] font-bold uppercase tracking-widest text-gray-500 hover:text-black hover:bg-gray-50 transition-all flex items-center gap-3 rounded-r-md">
                    <i class="ri-cash-line text-lg"></i> Products Sold
                </button>
                
                <button onclick="switchTab('banners')" id="btn-banners" class="tab-btn w-full text-left px-4 py-3.5 text-[10px] font-bold uppercase tracking-widest text-gray-500 hover:text-black hover:bg-blue-50 transition-all flex items-center gap-3 mt-4 rounded-r-md border-t border-gray-100 pt-5">
                    <i class="ri-slideshow-3-line text-lg text-blue-500"></i> Homepage Banners
                </button>
            </aside>

            <div class="flex-grow bg-white p-4 md:p-8 rounded-lg border border-gray-100 shadow-sm min-h-[600px] overflow-hidden">
                
                <section id="sec-users" class="block space-y-6 animate-fade">
                    <div class="flex items-center justify-between border-b border-gray-100 pb-4">
                        <h2 class="text-lg md:text-xl font-bold tracking-tight text-gray-900">Global User Identities</h2>
                    </div>
                    <div id="user-list" class="overflow-x-auto"></div>
                </section>

                <section id="sec-store" class="hidden space-y-6 animate-fade">
                    <div class="flex items-center justify-between border-b border-gray-100 pb-4">
                        <h2 class="text-lg md:text-xl font-bold tracking-tight text-gray-900">Master Inventory</h2>
                        <button onclick="toggleModal('productModal', true)" class="text-[10px] font-bold uppercase tracking-widest bg-black text-white px-4 py-2 rounded hover:bg-gray-800 transition-all shadow-md flex items-center gap-1.5">
                            <i class="ri-add-line"></i> <span class="hidden sm:inline">Add Product</span>
                        </button>
                    </div>
                    <div id="inventory-list" class="overflow-x-auto"></div>
                </section>

                <section id="sec-sales" class="hidden space-y-6 animate-fade">
                    <div class="flex items-center justify-between border-b border-gray-100 pb-4">
                        <h2 class="text-lg md:text-xl font-bold tracking-tight text-gray-900">Sales Log (Orders)</h2>
                    </div>
                    <div id="sales-list" class="overflow-x-auto"></div>
                </section>

                <section id="sec-banners" class="hidden space-y-6 animate-fade">
                    <div class="flex items-center justify-between border-b border-gray-100 pb-4">
                        <h2 class="text-lg md:text-xl font-bold tracking-tight text-gray-900">Homepage Banners</h2>
                        <button onclick="toggleModal('bannerModal', true)" class="text-[10px] font-bold uppercase tracking-widest bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition-all shadow-md flex items-center gap-1.5">
                            <i class="ri-add-line"></i> <span class="hidden sm:inline">Add New Banner</span>
                        </button>
                    </div>
                    
                    <div id="banner-loading" class="text-center py-10 hidden">
                        <p class="text-xs text-gray-400 animate-pulse">Loading Banners...</p>
                    </div>

                    <div id="banner-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                </section>

            </div>
        </div>
    </main>

    <div id="productModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" style="display: none;">
        <div class="bg-white w-full max-w-lg rounded-lg p-6 md:p-8 shadow-2xl relative max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-lg font-bold text-gray-900 uppercase tracking-tight">List New Product</h3>
                <button onclick="toggleModal('productModal', false)" class="text-gray-400 hover:text-black text-2xl transition-colors"><i class="ri-close-line"></i></button>
            </div>
            <form id="admin-form" onsubmit="saveProduct(event)" class="space-y-4">
                <div><label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-1">Product Name</label><input type="text" id="p-name" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-black" required></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-1">Sale Price (₹)</label><input type="number" id="p-price" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-black" required></div>
                    <div><label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-1">Original MRP (₹)</label><input type="number" id="p-mrp" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-black"></div>
                </div>
                <div><label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-1">Category</label><select id="p-cat" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-black" required><option value="Men">Men's Fashion</option><option value="Women">Women's Fashion</option><option value="Kids">Kids' Collection</option><option value="Featured">Top Pick / Featured</option></select></div>
                <div><label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-1">Image URL</label><input type="url" id="p-img" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-black" required></div>
                <div><label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-1">Purchase Link (Ext. URL)</label><input type="url" id="p-link" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-black" required></div>
                <button type="submit" class="w-full bg-black text-white py-3.5 text-xs font-bold mt-4 shadow-md hover:bg-gray-800 transition-colors rounded uppercase tracking-widest">Publish to Store</button>
            </form>
        </div>
    </div>

    <div id="bannerModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" style="display: none;">
        <div class="bg-white w-full max-w-lg rounded-lg p-6 md:p-8 shadow-2xl relative">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-lg font-bold text-gray-900 uppercase tracking-tight">Add Homepage Banner</h3>
                <button onclick="toggleModal('bannerModal', false)" class="text-gray-400 hover:text-black text-2xl transition-colors"><i class="ri-close-line"></i></button>
            </div>
            <form id="banner-form" onsubmit="saveBanner(event)" class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-1">Banner Image URL</label>
                    <input type="url" id="b-image" placeholder="https://..." class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-blue-500" required>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-1">Target URL (On Click)</label>
                    <input type="url" id="b-link" placeholder="https://..." class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-blue-500" required>
                </div>
                <div class="border border-gray-100 rounded-md p-4 bg-gray-50 mt-2">
                    <label class="text-xs font-bold text-gray-700 uppercase tracking-widest block mb-3 border-b border-gray-200 pb-2">Overlay Customization</label>
                    <div class="mb-3">
                        <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1">Text on Banner (Optional)</label>
                        <input type="text" id="b-text" placeholder="e.g. Summer Sale 50% Off" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1">Text Position</label>
                            <select id="b-text-pos" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-blue-500">
                                <option value="center">Center</option>
                                <option value="left">Left</option>
                                <option value="right">Right</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase block mb-1">Priority (1 = First)</label>
                            <input type="number" id="b-priority" value="0" class="w-full border border-gray-300 rounded px-3 py-2 text-sm outline-none focus:border-blue-500">
                        </div>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3.5 text-xs font-bold mt-4 shadow-md hover:bg-blue-700 transition-colors rounded uppercase tracking-widest">Publish Banner</button>
            </form>
        </div>
    </div>

    <div id="custom-alert-container"></div>

    <script src="js/auth.js"></script>
    <script src="js/admin_dashboard.js"></script>
</body>
</html>
